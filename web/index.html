<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VerumOS · 科研 AI 操作系统</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0b0d;
  --surface: #111214;
  --surface2: #18191c;
  --surface3: #1f2023;
  --border: rgba(255,255,255,0.08);
  --border-active: rgba(255,255,255,0.15);
  --text: #e8e9eb;
  --text-dim: #8b8d94;
  --text-faint: #4a4c52;
  --accent: #6ee7b7;
  --accent-dim: rgba(110,231,183,0.15);
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,0.15);
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,0.15);
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.15);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.15);
  --radius: 8px;
  --radius-lg: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}

/* Layout - Two column */
.app {
  display: grid;
  grid-template-columns: 1fr 400px;
  grid-template-rows: 56px 1fr;
  height: 100vh;
  grid-template-areas:
    "header header"
    "main sidebar";
}

/* Header */
.header {
  grid-area: header;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 24px;
  background: var(--surface);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--blue) 100%);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -0.02em;
}

.logo-tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  background: var(--surface2);
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: 0.05em;
}

.header-nav {
  display: flex;
  gap: 4px;
  margin-left: 32px;
}

.nav-item {
  padding: 8px 16px;
  border-radius: var(--radius);
  cursor: pointer;
  color: var(--text-dim);
  font-size: 13px;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.nav-item:hover { color: var(--text); background: var(--surface2); }
.nav-item.active { color: var(--text); background: var(--surface3); }

.nav-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.nav-dot.data { background: var(--accent); }
.nav-dot.model { background: var(--purple); }
.nav-dot.analysis { background: var(--blue); }

.header-actions {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

.status-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 4px 12px;
  border-radius: 20px;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Main area */
.main {
  grid-area: main;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

/* Data preview panel */
.data-preview-panel {
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  max-height: 280px;
  overflow: hidden;
  display: none;
}

.data-preview-panel.visible {
  display: block;
}

.preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}

.preview-title {
  font-weight: 500;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.preview-close {
  cursor: pointer;
  color: var(--text-dim);
  font-size: 18px;
}

.preview-close:hover { color: var(--text); }

.preview-table-wrapper {
  overflow-x: auto;
  overflow-y: auto;
  max-height: 220px;
}

.preview-table {
  width: 100%;
  border-collapse: collapse;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
}

.preview-table th,
.preview-table td {
  padding: 8px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.preview-table th {
  background: var(--surface2);
  position: sticky;
  top: 0;
  z-index: 1;
}

.preview-table th .col-type {
  font-size: 9px;
  color: var(--text-faint);
  display: block;
  font-weight: 400;
}

.col-type.numeric { color: var(--accent); }
.col-type.categorical { color: var(--blue); }
.col-type.boolean { color: var(--purple); }

.preview-table tr:hover td {
  background: var(--surface2);
}

/* Chat area */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.welcome {
  text-align: center;
  padding: 60px 40px;
}

.welcome-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--blue) 100%);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin: 0 auto 20px;
}

.welcome-title {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 500;
  margin-bottom: 12px;
}

.welcome-desc {
  color: var(--text-dim);
  max-width: 500px;
  margin: 0 auto 32px;
  line-height: 1.7;
}

.quick-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.quick-action {
  padding: 12px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s;
  font-size: 13px;
  color: var(--text-dim);
}

.quick-action:hover {
  border-color: var(--border-active);
  color: var(--text);
  background: var(--surface2);
}

.quick-action-icon {
  margin-right: 8px;
}

/* Messages */
.message {
  display: flex;
  gap: 12px;
  max-width: 900px;
}

.message-avatar {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.message-avatar.user { background: var(--surface3); }
.message-avatar.data { background: var(--accent-dim); }
.message-avatar.model { background: var(--purple-dim); }
.message-avatar.analysis { background: var(--blue-dim); }

.message-content {
  flex: 1;
}

.message-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.message-name {
  font-weight: 500;
  font-size: 13px;
}

.message-time {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-faint);
}

.message-text {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  line-height: 1.7;
}

.message-text code {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  background: var(--surface2);
  padding: 2px 6px;
  border-radius: 4px;
}

/* Data card in message */
.data-card {
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 14px;
  margin-top: 12px;
}

.data-card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.data-card-title {
  font-weight: 500;
  font-size: 13px;
}

.data-card-badge {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--accent-dim);
  color: var(--accent);
}

.data-card-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.stat-item {
  text-align: center;
}

.stat-value {
  font-family: 'DM Mono', monospace;
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
}

.stat-label {
  font-size: 11px;
  color: var(--text-dim);
}

/* Toolchain card */
.toolchain-card {
  background: var(--blue-dim);
  border: 1px solid rgba(96,165,250,0.2);
  border-radius: var(--radius);
  padding: 14px;
  margin-top: 12px;
}

.toolchain-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--blue);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.toolchain-steps {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.toolchain-step {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
}

.step-number {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 500;
}

/* Input area */
.input-area {
  border-top: 1px solid var(--border);
  padding: 16px 24px;
  background: var(--surface);
}

.input-row {
  display: flex;
  gap: 12px;
  align-items: flex-end;
}

.input-wrapper {
  flex: 1;
  position: relative;
}

.input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  resize: none;
  outline: none;
  min-height: 48px;
  max-height: 200px;
  line-height: 1.5;
}

.input:focus { border-color: var(--border-active); }
.input::placeholder { color: var(--text-faint); }

.input-actions {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.input-action {
  padding: 6px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 12px;
  color: var(--text-dim);
  transition: all 0.15s;
}

.input-action:hover { border-color: var(--border-active); color: var(--text); }

.send-btn {
  padding: 12px 24px;
  background: var(--accent);
  color: #0a0b0d;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}

.send-btn:hover { background: #5dd4a8; }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Right sidebar */
.right-sidebar {
  grid-area: sidebar;
  border-left: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}

.sidebar-tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-dim);
  transition: all 0.15s;
  border-bottom: 2px solid transparent;
}

.sidebar-tab:hover { color: var(--text); }
.sidebar-tab.active {
  color: var(--text);
  border-bottom-color: var(--accent);
}

.sidebar-content {
  flex: 1;
  overflow-y: auto;
  display: none;
}

.sidebar-content.active {
  display: block;
}

/* Requirement document editor */
.requirement-editor {
  padding: 16px;
}

.requirement-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.requirement-title {
  font-weight: 500;
  font-size: 14px;
}

.requirement-status {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
}

.requirement-status.draft { background: var(--text-faint); color: var(--text); }
.requirement-status.discussing { background: var(--amber-dim); color: var(--amber); }
.requirement-status.confirmed { background: var(--accent-dim); color: var(--accent); }
.requirement-status.executing { background: var(--blue-dim); color: var(--blue); }
.requirement-status.completed { background: var(--accent-dim); color: var(--accent); }

.requirement-textarea {
  width: 100%;
  min-height: 300px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  resize: vertical;
  outline: none;
}

.requirement-textarea:focus { border-color: var(--border-active); }

.requirement-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.requirement-btn {
  flex: 1;
  padding: 8px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 12px;
  transition: all 0.15s;
}

.requirement-btn.primary {
  background: var(--accent);
  color: #0a0b0d;
  border: none;
}

.requirement-btn.secondary {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
}

.requirement-btn:hover { opacity: 0.9; }

/* Toolchain preview */
.toolchain-preview {
  padding: 16px;
}

.toolchain-empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-dim);
}

.toolchain-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toolchain-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: var(--surface2);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}

.toolchain-item .step-num {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--accent-dim);
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 500;
}

.toolchain-item .step-info {
  flex: 1;
}

.toolchain-item .step-tool {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text);
}

.toolchain-item .step-desc {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* Datasets panel in sidebar */
.datasets-panel {
  padding: 16px;
}

.dataset-item {
  padding: 12px;
  background: var(--surface2);
  border-radius: var(--radius);
  margin-bottom: 8px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
}

.dataset-item:hover { border-color: var(--border-active); }
.dataset-item.active { border-color: var(--accent); }

.dataset-name {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 4px;
}

.dataset-meta {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-active); }

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message { animation: fadeIn 0.3s ease; }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">🧬</div>
      <span class="logo-text">VerumOS</span>
      <span class="logo-tag">ALPHA</span>
    </div>

    <nav class="header-nav">
      <div class="nav-item active" onclick="switchAgent('data')">
        <span class="nav-dot data"></span>
        数据
      </div>
      <div class="nav-item" onclick="switchAgent('model')">
        <span class="nav-dot model"></span>
        模型
      </div>
      <div class="nav-item" onclick="switchAgent('analysis')">
        <span class="nav-dot analysis"></span>
        分析
      </div>
    </nav>

    <div class="header-actions">
      <div class="status-badge">
        <span class="status-dot"></span>
        本地服务运行中
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="main">
    <!-- Data Preview Panel -->
    <div class="data-preview-panel" id="dataPreviewPanel">
      <div class="preview-header">
        <div class="preview-title">
          <span>📊</span>
          <span id="previewDatasetName">数据预览</span>
        </div>
        <span class="preview-close" onclick="hidePreviewPanel()">×</span>
      </div>
      <div class="preview-table-wrapper">
        <table class="preview-table" id="previewTable">
          <thead id="previewTableHead"></thead>
          <tbody id="previewTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Chat area -->
    <div class="chat-area" id="chatArea">
      <!-- Welcome -->
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🧬</div>
        <h1 class="welcome-title">欢迎使用 VerumOS</h1>
        <p class="welcome-desc">
          我是你的科研 AI 助手。你可以上传数据、讨论分析需求、执行分析流程。
          只需描述你的需求，我会帮你完成技术实现。
        </p>
        <div class="quick-actions">
          <div class="quick-action" onclick="quickAction('upload')">
            <span class="quick-action-icon">📁</span>
            上传数据
          </div>
          <div class="quick-action" onclick="quickAction('requirement')">
            <span class="quick-action-icon">📝</span>
            讨论需求
          </div>
          <div class="quick-action" onclick="quickAction('analyze')">
            <span class="quick-action-icon">🔬</span>
            分析数据
          </div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <div class="input-wrapper">
          <textarea class="input" id="input" rows="1" placeholder="描述你的需求，或上传数据文件..."></textarea>
          <div class="input-actions">
            <div class="input-action" onclick="uploadFile()">📎 上传文件</div>
            <div class="input-action" onclick="showDatasets()">📊 数据集</div>
            <div class="input-action" onclick="showHelp()">❓ 帮助</div>
          </div>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
      </div>
    </div>
  </main>

  <!-- Right Sidebar -->
  <aside class="right-sidebar">
    <div class="sidebar-tabs">
      <div class="sidebar-tab active" onclick="switchSidebarTab('requirement')">需求文档</div>
      <div class="sidebar-tab" onclick="switchSidebarTab('toolchain')">工具链</div>
      <div class="sidebar-tab" onclick="switchSidebarTab('datasets')">数据集</div>
    </div>

    <!-- Requirement Document -->
    <div class="sidebar-content active" id="requirementContent">
      <div class="requirement-editor">
        <div class="requirement-header">
          <span class="requirement-title">需求文档</span>
          <span class="requirement-status draft" id="requirementStatus">草稿</span>
        </div>
        <textarea class="requirement-textarea" id="requirementTextarea" placeholder="# 需求文档

## 数据源
| 文件 | 类型 | 描述 |
|------|------|------|
| count_matrix.csv | 表达矩阵 | gene × cell |

## 目标
细胞类型鉴定

## 分析方案
1. 加载表达矩阵
2. QC 过滤
3. 标准化
"></textarea>
        <div class="requirement-actions">
          <button class="requirement-btn secondary" onclick="loadRequirementTemplate()">加载模板</button>
          <button class="requirement-btn primary" onclick="saveRequirement()">保存</button>
        </div>
      </div>
    </div>

    <!-- Toolchain Preview -->
    <div class="sidebar-content" id="toolchainContent">
      <div class="toolchain-preview">
        <div class="requirement-header">
          <span class="requirement-title">推荐工具链</span>
        </div>
        <div class="toolchain-empty" id="toolchainEmpty">
          暂无工具链<br>
          <small>保存需求文档后自动生成</small>
        </div>
        <div class="toolchain-list" id="toolchainList"></div>
      </div>
    </div>

    <!-- Datasets -->
    <div class="sidebar-content" id="datasetsContent">
      <div class="datasets-panel" id="datasetsPanel">
        <div class="toolchain-empty">
          暂无数据集<br>
          <small>上传文件后显示</small>
        </div>
      </div>
    </div>
  </aside>
</div>

<script>
let currentAgent = 'data';
let sessionId = null;
let socket = null;
let datasets = [];
let isBusy = false;
let currentRequirement = null;
let currentToolChain = [];

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatText(value) {
  return escapeHtml(value).replace(/\n/g, '<br>');
}

function setStatus(text, connected = true) {
  const badge = document.querySelector('.status-badge');
  if (!badge) return;
  badge.innerHTML = `<span class="status-dot" style="background:${connected ? 'var(--accent)' : 'var(--amber)'}"></span>${escapeHtml(text)}`;
}

function switchAgent(agent) {
  currentAgent = agent;
  document.querySelectorAll('.nav-item').forEach((element, index) => {
    const agents = ['data', 'model', 'analysis'];
    element.classList.toggle('active', agents[index] === agent);
  });
}

function switchSidebarTab(tab) {
  document.querySelectorAll('.sidebar-tab').forEach((el, i) => {
    const tabs = ['requirement', 'toolchain', 'datasets'];
    el.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.sidebar-content').forEach((el, i) => {
    const tabs = ['requirement', 'toolchain', 'datasets'];
    el.classList.toggle('active', tabs[i] === tab);
  });
}

function quickAction(action) {
  const input = document.getElementById('input');
  if (action === 'upload') input.value = '上传 data/count_matrix.csv';
  if (action === 'requirement') input.value = '我想做细胞类型鉴定';
  if (action === 'analyze') input.value = '探索这份数据';
  input.focus();
}

function addMessage(role, content, extraHtml = '') {
  const chatArea = document.getElementById('chatArea');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.style.display = 'none';

  const meta = {
    user: { icon: '👤', name: '你' },
    data: { icon: '📊', name: 'Data Agent' },
    system: { icon: '⚡', name: 'System' },
  }[role] || { icon: '💬', name: 'Assistant' };

  const node = document.createElement('div');
  node.className = 'message';
  node.innerHTML = `
    <div class="message-avatar ${role === 'user' ? 'user' : 'data'}">${meta.icon}</div>
    <div class="message-content">
      <div class="message-header">
        <span class="message-name">${meta.name}</span>
        <span class="message-time">${new Date().toLocaleTimeString()}</span>
      </div>
      <div class="message-text">${formatText(content)}</div>
      ${extraHtml}
    </div>
  `;
  chatArea.appendChild(node);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function renderResultCard(result) {
  if (!result) return '';
  const dataset = result.dataset || null;
  const metadata = dataset?.metadata || result;
  const shape = metadata?.shape || null;
  if (!shape) return '';

  const preview = Array.isArray(result.preview) ? result.preview : Array.isArray(metadata.preview) ? metadata.preview : [];
  const previewRows = preview.slice(0, 3).map((row) => `<div class="data-item-meta">${escapeHtml(JSON.stringify(row))}</div>`).join('');

  return `
    <div class="data-card">
      <div class="data-card-header">
        <span class="data-card-title">${escapeHtml(dataset?.name || '数据概览')}</span>
        <span class="data-card-badge">已加载</span>
      </div>
      <div class="data-card-stats">
        <div class="stat-item"><div class="stat-value">${shape.rows || shape.cells || '-'}</div><div class="stat-label">行/细胞</div></div>
        <div class="stat-item"><div class="stat-value">${shape.columns || shape.genes || '-'}</div><div class="stat-label">列/基因</div></div>
        <div class="stat-item"><div class="stat-value">${preview.length}</div><div class="stat-label">预览行</div></div>
      </div>
      ${previewRows ? `<div style="margin-top:12px">${previewRows}</div>` : ''}
    </div>
  `;
}

function renderToolChainCard(toolChain) {
  if (!toolChain || toolChain.length === 0) return '';

  const steps = toolChain.map((step, i) => `
    <div class="toolchain-step">
      <span class="step-number">${i + 1}</span>
      <span>${escapeHtml(step.skill)}.${escapeHtml(step.tool)}</span>
    </div>
  `).join('');

  return `
    <div class="toolchain-card">
      <div class="toolchain-label">推荐工具链</div>
      <div class="toolchain-steps">${steps}</div>
    </div>
  `;
}

function showPreviewPanel(datasetId) {
  const dataset = datasets.find(d => d.id === datasetId);
  if (!dataset || !dataset.metadata?.preview) return;

  const panel = document.getElementById('dataPreviewPanel');
  const nameEl = document.getElementById('previewDatasetName');
  const thead = document.getElementById('previewTableHead');
  const tbody = document.getElementById('previewTableBody');

  nameEl.textContent = dataset.name;

  const columns = dataset.metadata.columns || [];
  const preview = dataset.metadata.preview || [];

  // Build header
  thead.innerHTML = '<tr>' + columns.slice(0, 20).map(col =>
    `<th>${escapeHtml(col.name)}<span class="col-type ${col.type}">${col.type}</span></th>`
  ).join('') + '</tr>';

  // Build body
  tbody.innerHTML = preview.slice(0, 20).map(row =>
    '<tr>' + columns.slice(0, 20).map(col =>
      `<td>${escapeHtml(row[col.name] ?? '')}</td>`
    ).join('') + '</tr>'
  ).join('');

  panel.classList.add('visible');
}

function hidePreviewPanel() {
  document.getElementById('dataPreviewPanel').classList.remove('visible');
}

function refreshDataPanel(nextDatasets) {
  if (Array.isArray(nextDatasets)) datasets = nextDatasets;
  const panel = document.getElementById('datasetsPanel');
  if (!panel) return;

  if (!datasets.length) {
    panel.innerHTML = `
      <div class="toolchain-empty">
        暂无数据集<br>
        <small>上传文件后显示</small>
      </div>
    `;
    return;
  }

  panel.innerHTML = datasets.map((dataset, index) => {
    const shape = dataset.metadata?.shape;
    return `
      <div class="dataset-item ${index === datasets.length - 1 ? 'active' : ''}" onclick="showPreviewPanel('${dataset.id}')">
        <div class="dataset-name">${escapeHtml(dataset.name)}</div>
        <div class="dataset-meta">${shape ? `${shape.rows || shape.cells || '-'} × ${shape.columns || shape.genes || '-'}` : '待分析'}</div>
      </div>
    `;
  }).join('');
}

function updateRequirementStatus(status) {
  const statusEl = document.getElementById('requirementStatus');
  statusEl.className = `requirement-status ${status}`;
  const statusText = {
    draft: '草稿',
    discussing: '讨论中',
    confirmed: '已确认',
    executing: '执行中',
    completed: '已完成'
  };
  statusEl.textContent = statusText[status] || status;
}

function updateToolChainList(toolChain) {
  currentToolChain = toolChain || [];
  const emptyEl = document.getElementById('toolchainEmpty');
  const listEl = document.getElementById('toolchainList');

  if (!currentToolChain.length) {
    emptyEl.style.display = 'block';
    listEl.innerHTML = '';
    return;
  }

  emptyEl.style.display = 'none';
  listEl.innerHTML = currentToolChain.map((step, i) => `
    <div class="toolchain-item">
      <span class="step-num">${i + 1}</span>
      <div class="step-info">
        <div class="step-tool">${escapeHtml(step.skill)}.${escapeHtml(step.tool)}</div>
        <div class="step-desc">${escapeHtml(JSON.stringify(step.params).slice(0, 50))}</div>
      </div>
    </div>
  `).join('');
}

async function ensureSession() {
  if (sessionId) return sessionId;
  const response = await fetch('/api/session', { method: 'POST' });
  const payload = await response.json();
  sessionId = payload.sessionId;
  refreshDataPanel(payload.context?.datasets || []);
  loadRequirement();
  connectWebSocket();
  return sessionId;
}

function connectWebSocket() {
  if (!sessionId) return;
  if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) return;
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  socket = new WebSocket(`${protocol}//${location.host}/ws?sessionId=${encodeURIComponent(sessionId)}`);

  socket.addEventListener('open', () => {
    setStatus('WebSocket 已连接');
    socket.send(JSON.stringify({ type: 'ping' }));
  });

  socket.addEventListener('message', (event) => {
    try {
      const payload = JSON.parse(event.data);
      if (payload.type === 'connected') setStatus(`会话 ${payload.sessionId} 已连接`);
      if (payload.type === 'dataset.registered' || payload.type === 'chat.completed') setStatus('会话已同步');
    } catch {
      setStatus('收到实时事件');
    }
  });

  socket.addEventListener('close', () => setStatus('WebSocket 已断开', false));
  socket.addEventListener('error', () => setStatus('WebSocket 连接失败', false));
}

async function loadRequirement() {
  if (!sessionId) return;
  try {
    const response = await fetch(`/api/requirement/${sessionId}`);
    const payload = await response.json();
    if (payload.ok && payload.document) {
      currentRequirement = payload.document;
      document.getElementById('requirementTextarea').value = payload.markdown || '';
      updateRequirementStatus(payload.document.status);
      updateToolChainList(payload.toolChain);
    }
  } catch (error) {
    console.error('Failed to load requirement:', error);
  }
}

async function saveRequirement() {
  if (!sessionId) {
    await ensureSession();
  }

  const content = document.getElementById('requirementTextarea').value;

  try {
    const response = await fetch(`/api/requirement/${sessionId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ markdown: content }),
    });
    const payload = await response.json();
    if (payload.ok) {
      currentRequirement = payload.document;
      updateRequirementStatus(payload.document.status);
      updateToolChainList(payload.toolChain);
      addMessage('system', '需求文档已保存');
    }
  } catch (error) {
    addMessage('system', `保存失败：${error.message}`);
  }
}

function loadRequirementTemplate() {
  const template = `# 需求文档_单细胞分析

## 数据源
| 文件 | 类型 | 描述 |
|------|------|------|
| count_matrix.csv | 表达矩阵 | gene × cell |

## 目标
细胞类型鉴定

  document.getElementById('requirementTextarea').value = template;
}

async function sendMessage() {
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text || isBusy) return;

  await ensureSession();
  isBusy = true;
  sendBtn.disabled = true;
  addMessage('user', text);
  input.value = '';

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId, message: text }),
    });
    const payload = await response.json();
    if (!response.ok || !payload.ok) throw new Error(payload.error || 'Chat request failed');
    refreshDataPanel(payload.context?.datasets || []);

    // Check if response has requirement document
    if (payload.response.result?.requirementDocument) {
      currentRequirement = payload.response.result.requirementDocument;
      document.getElementById('requirementTextarea').value = payload.response.result.markdown || '';
      updateRequirementStatus(currentRequirement.status);
      updateToolChainList(payload.response.result.toolChain);
    }

    const extraHtml = renderResultCard(payload.response.result) +
      renderToolChainCard(payload.response.result?.toolChain);
    addMessage('data', payload.response.content, extraHtml);
  } catch (error) {
    addMessage('system', `请求失败：${error.message || error}`);
  } finally {
    isBusy = false;
    sendBtn.disabled = false;
  }
}

async function uploadFile() {
  const picker = document.createElement('input');
  picker.type = 'file';
  picker.accept = '.csv,.tsv,.xlsx,.xls';
  picker.onchange = async (event) => {
    const file = event.target.files?.[0];
    if (!file) return;

    await ensureSession();
    addMessage('user', `上传文件：${file.name}`);

    const formData = new FormData();
    formData.append('sessionId', sessionId);
    formData.append('file', file);

    try {
      const response = await fetch('/api/upload', { method: 'POST', body: formData });
      const payload = await response.json();
      if (!response.ok || !payload.ok) throw new Error(payload.error || 'Upload failed');
      refreshDataPanel(payload.context?.datasets || []);
      addMessage('data', payload.response.content, renderResultCard(payload.response.result));
    } catch (error) {
      addMessage('system', `上传失败：${error.message || error}`);
    }
  };
  picker.click();
}

function showDatasets() {
  switchSidebarTab('datasets');
}

function showHelp() {
  addMessage('system', '你可以：\n1. 上传 CSV/Excel 文件\n2. 说"我想做细胞类型鉴定"开始需求讨论\n3. 问"这份数据有多少行？"\n4. 说"探索这份数据"');
}

document.getElementById('input').addEventListener('keydown', (event) => {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    sendMessage();
  }
});

document.getElementById('input').addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});

window.addEventListener('load', async () => {
  setStatus('正在初始化会话...');
  await ensureSession();
  setStatus('会话已建立');
});
</script>
